services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-wahasender}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wahasender}
      POSTGRES_DB: ${DB_NAME:-wahasender}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wahasender} -d ${DB_NAME:-wahasender}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVICE_NAME: web
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-wahasender}
      DB_PASSWORD: ${DB_PASSWORD:-wahasender}
      DB_NAME: ${DB_NAME:-wahasender}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # SaaS: self-service, e-mail and Mercado Pago billing
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-WahaSender <no-reply@wahasender.local>}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker.cjs"]
    environment:
      NODE_ENV: production
      SERVICE_NAME: worker
      APP_URL: ${APP_URL:-http://localhost:3000}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-wahasender}
      DB_PASSWORD: ${DB_PASSWORD:-wahasender}
      DB_NAME: ${DB_NAME:-wahasender}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  app_storage:
